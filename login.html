<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuyCrafting - Acceso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6366f1;--bg:#0a0e1a;--bg-card:#1e293b;--text:#f8fafc;--text-muted:#94a3b8;--border:#334155;--gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a855f7 100%)}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        
        .brand{text-align:center;margin-bottom:30px}
        .logo-icon{width:70px;height:70px;background:var(--gradient);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 15px;animation:gradient 3s ease infinite,float 3s ease-in-out infinite}
        .logo-text{font-size:28px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradient 3s ease infinite}
        
        .login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:30px;width:100%;max-width:400px;animation:slideUp 0.5s ease}
        .login-header{text-align:center;margin-bottom:25px}
        .login-title{font-size:22px;font-weight:600;margin-bottom:5px}
        .login-subtitle{color:var(--text-muted);font-size:14px}
        
        .form-group{margin-bottom:18px}
        label{display:block;margin-bottom:6px;font-size:13px;color:var(--text-muted)}
        .input-wrapper{position:relative}
        .input-wrapper i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
        input{width:100%;padding:12px 14px 12px 40px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px}
        input:focus{outline:none;border-color:var(--primary)}
        .password-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer}
        
        .btn{width:100%;padding:14px;background:var(--gradient);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
        .btn:hover{opacity:0.95}
        .btn:disabled{opacity:0.6;cursor:not-allowed}
        
        .error{color:#ef4444;font-size:13px;margin-top:10px;display:none}
        .error.show{display:block}
        .success{color:#10b981;font-size:13px;margin-top:10px;display:none}
        .success.show{display:block}
        
        .info{background:rgba(99,102,241,0.15);border:1px solid var(--primary);border-radius:10px;padding:12px;margin-top:15px;font-size:13px;color:var(--text-muted)}
        .info code{background:var(--bg);padding:2px 6px;border-radius:4px;color:var(--primary);font-family:monospace}
        
        .debug{margin-top:20px;padding:10px;background:#1a1a2e;border-radius:8px;font-size:11px;color:#888;max-height:150px;overflow-y:auto;font-family:monospace}
        .debug.show{display:block}
        .debug-title{color:var(--primary);margin-bottom:5px;font-weight:600}
    </style>
</head>
<body>
    <div class="brand">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <div class="logo-text">BuyCrafting</div>
    </div>
    
    <div class="login-card">
        <div class="login-header">
            <div class="login-title">Acceso al Panel</div>
            <div class="login-subtitle">Ingresa tu API Key</div>
        </div>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>API Key</label>
                <div class="input-wrapper">
                    <input type="password" id="apiKey" placeholder="sk_live_..." required autocomplete="off" value="sk_live_demo123">
                    <i class="fas fa-key"></i>
                    <button type="button" class="password-toggle" onclick="toggleKey()"><i class="fas fa-eye" id="eyeIcon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Acceder</button>
            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg"></div>
        </form>
        
        <div class="info">
            <i class="fas fa-info-circle"></i> Key por defecto: <code>sk_live_demo123</code><br>
            <small>Si falla, revisa la consola de debug abajo</small>
        </div>
        
        <div class="debug" id="debugConsole" style="display:none">
            <div class="debug-title">🔧 Debug Console</div>
            <div id="debugLog"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ylkrrcntsztytvsboypl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsa3JyY250c3p0eXR2c2JveXBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Nzc5ODUsImV4cCI6MjA5MDE1Mzk4NX0.Swo1mFTcvgEW0WhiS2Uu5zq7y_NIZ-2irsilubNH8OU';
        
        function log(msg){const d=document.getElementById('debugLog');if(d){d.innerHTML+=`<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;d.scrollTop=d.scrollHeight}}
        function showDebug(){document.getElementById('debugConsole').classList.add('show')}
        
        function toggleKey(){
            const input=document.getElementById('apiKey'),icon=document.getElementById('eyeIcon');
            if(input.type==='password'){input.type='text';icon.className='fas fa-eye-slash';log('👁️ Key visible')}
            else{input.type='password';icon.className='fas fa-eye';log('🔒 Key oculta')}
        }
        
        function showError(msg){const el=document.getElementById('errorMsg');el.innerText='⚠ '+msg;el.classList.add('show');log('❌ Error: '+msg)}
        function showSuccess(msg){const el=document.getElementById('successMsg');el.innerText='✅ '+msg;el.classList.add('show');log('✅ '+msg)}
        
        async function handleLogin(e){
            e.preventDefault();
            showDebug();
            const key=document.getElementById('apiKey').value.trim();
            const btn=document.getElementById('loginBtn');
            const err=document.getElementById('errorMsg');
            const succ=document.getElementById('successMsg');
            
            err.classList.remove('show');succ.classList.remove('show');
            btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Verificando...';
            log('🔑 Intentando login con key: '+key.substring(0,15)+'...');
            
            // ⚠️ MODO DEMO: Si la key es la por defecto, entrar directo (para testing)
            if(key === 'sk_live_demo123'){
                log('✅ Key por defecto detectada - Acceso concedido (modo demo)');
                showSuccess('¡Acceso concedido!');
                setTimeout(()=>{
                    localStorage.setItem('buycrafting_auth','true');
                    localStorage.setItem('buycrafting_key',key);
                    window.location.href='index.html';
                },1000);
                return;
            }
            
            // Intentar conectar con Supabase
            try{
                log('🔌 Conectando a Supabase...');
                const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
                
                log('📡 Consultando tabla config...');
                const{data,error}=await supabase.from('config').select('api_key').eq('id',1).single();
                
                if(error){
                    log('❌ Error DB: '+error.message);
                    showError('No se pudo conectar a la base de datos');
                    log('💡 Usando modo offline - ¿Quieres entrar igual?');
                    // Fallback: permitir entrar si el usuario confirma (para testing)
                    if(confirm('⚠️ No se pudo conectar a la DB. ¿Entrar en modo offline?')){
                        localStorage.setItem('buycrafting_auth','true');
                        localStorage.setItem('buycrafting_key',key);
                        window.location.href='index.html';
                    }
                    btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Acceder';
                    return;
                }
                
                log('✅ DB respondió. Key guardada: '+data.api_key?.substring(0,15)+'...');
                
                if(key === data.api_key){
                    log('✅ Key correcta - Acceso concedido');
                    showSuccess('¡Bienvenido!');
                    localStorage.setItem('buycrafting_auth','true');
                    localStorage.setItem('buycrafting_key',key);
                    setTimeout(()=>{window.location.href='index.html'},1000);
                }else{
                    log('❌ Key incorrecta');
                    showError('API Key incorrecta');
                    btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Acceder';
                }
            }catch(err){
                log('❌ Error fatal: '+err.message);
                showError('Error: '+err.message);
                btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Acceder';
            }
        }
        
        // Auto-login si ya está autenticado
        if(localStorage.getItem('buycrafting_auth')==='true'){
            log('🔄 Sesión activa detectada - Redirigiendo...');
            window.location.href='index.html';
        }
        
        log('🚀 Login cargado. Listo para usar.');
    </script>
</body>
</html>
